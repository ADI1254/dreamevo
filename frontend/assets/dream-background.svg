<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="stars" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#e0e7ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1b1f3b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula" cx="30%" cy="70%" r="60%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#7f7cff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1b1f3b;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="1920" height="1080" fill="#0a0c1a"/>

  <!-- Nebula clouds -->
  <ellipse cx="400" cy="300" rx="300" ry="200" fill="url(#nebula)" opacity="0.6"/>
  <ellipse cx="1400" cy="600" rx="400" ry="250" fill="url(#nebula)" opacity="0.4"/>
  <ellipse cx="800" cy="800" rx="350" ry="180" fill="url(#nebula)" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="200" cy="150" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="450" cy="200" r="1.5" fill="#e0e7ff" opacity="0.8"/>
  <circle cx="700" cy="100" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="1100" cy="180" r="1.2" fill="#c7d2fe" opacity="0.8"/>
  <circle cx="1500" cy="250" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="300" cy="400" r="1.3" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="600" cy="350" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="900" cy="450" r="1.5" fill="#c7d2fe" opacity="0.7"/>
  <circle cx="1300" cy="300" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="1700" cy="500" r="1.2" fill="#e0e7ff" opacity="0.8"/>
  <circle cx="250" cy="650" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="550" cy="700" r="1.3" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="850" cy="600" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="1150" cy="750" r="1.5" fill="#e0e7ff" opacity="0.7"/>
  <circle cx="1550" cy="650" r="1" fill="#ffffff" opacity="0.9"/>

  <!-- Subtle star glow -->
  <circle cx="450" cy="200" r="3" fill="url(#stars)" opacity="0.3"/>
  <circle cx="900" cy="450" r="4" fill="url(#stars)" opacity="0.2"/>
  <circle cx="1300" cy="300" r="3" fill="url(#stars)" opacity="0.3"/>
</svg>